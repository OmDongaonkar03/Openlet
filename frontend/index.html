<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>Openlet - Anonymous Feedback Pages</title>
    <meta
      name="description"
      content="Create a free anonymous feedback page in 30 seconds. Share a link, collect honest star ratings and written responses. No login needed for respondents."
    />
    <meta
      name="keywords"
      content="anonymous feedback, feedback page, honest feedback, anonymous reviews, collect feedback, star ratings, feedback link, openlet"
    />
    <meta name="author" content="Openlet" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://openlet.pages.dev" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://openlet.pages.dev" />
    <meta property="og:site_name" content="Openlet" />
    <meta property="og:title" content="Openlet - Anonymous Feedback Pages" />
    <meta
      property="og:description"
      content="Create a free anonymous feedback page in 30 seconds. Share a link, collect honest star ratings and written responses. No login needed for respondents."
    />
    <meta property="og:image" content="https://openlet.pages.dev/logo-bg.png" />
    <meta property="og:image:width" content="1024" />
    <meta property="og:image:height" content="1024" />
    <meta
      property="og:image:alt"
      content="Openlet - speech bubble with an open padlock, symbolising anonymous feedback"
    />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Openlet - Anonymous Feedback Pages" />
    <meta
      name="twitter:description"
      content="Create a free anonymous feedback page in 30 seconds. Share a link, collect honest star ratings and written responses."
    />
    <meta
      name="twitter:image"
      content="https://openlet.pages.dev/logo-bg.png"
    />
    <meta name="twitter:image:alt" content="Openlet logo" />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/logo.ico" />
    <link rel="icon" type="image/png" sizes="512x512" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#ffffff" />
    <meta name="color-scheme" content="light" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Openlet",
        "url": "https://openlet.pages.dev",
        "description": "Create a free anonymous feedback page in 30 seconds. Share a link, collect honest star ratings and written responses.",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "All",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "featureList": [
          "Anonymous feedback collection",
          "Star ratings with written responses",
          "Custom shareable links",
          "No login required for respondents",
          "CSV export"
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
