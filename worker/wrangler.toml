name               = "openlet"
main               = "src/index.js"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding       = "DB"
database_name = "openlet"
database_id   = "1277cc3c-1941-4844-9974-138a16915ff4"
migrations_dir = "migrations"

# ── Rate Limiters ─────────────────────────────────────────────────────────────

[[ratelimits]]
name         = "RL_LOGIN"
namespace_id = "1001"

  [ratelimits.simple]
  limit  = 5
  period = 60

[[ratelimits]]
name         = "RL_REGISTER"
namespace_id = "1002"

  [ratelimits.simple]
  limit  = 3
  period = 60

[[ratelimits]]
name         = "RL_RESPONSES"
namespace_id = "1003"

  [ratelimits.simple]
  limit  = 10
  period = 60

# ── Secrets ───────────────────────────────────────────────────────────────────
# Never put secrets in this file. Set them via CLI:
#
#   npx wrangler secret put JWT_SECRET
#   npx wrangler secret put TURNSTILE_SECRET
#
# For local dev, add to .dev.vars (gitignored):
#   JWT_SECRET=your_local_jwt_secret
#   TURNSTILE_SECRET=your_turnstile_secret_key